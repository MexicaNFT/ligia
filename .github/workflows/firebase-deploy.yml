name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/615156232416/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: firebase-github-deploy@ligiaurroz.iam.gserviceaccount.com

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ligiaurroz
